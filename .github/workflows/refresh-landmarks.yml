# Rebuild the landmark dataset from Wikidata + OpenStreetMap and commit it when
# it changed. Kept OFF the deploy path on purpose: those external APIs time out
# often enough that coupling a prod deploy to them would break releases. This
# runs weekly (and on demand); a change lands as a normal commit to main, which
# then triggers Deploy.
name: Refresh landmarks

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

concurrency:
  group: refresh-landmarks
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/build-landmarks.ts
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain public/data)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add public/data/landmarks.*.json
            git commit -m 'Refresh landmarks from Wikidata + OpenStreetMap'
            git push
          else
            echo 'No landmark changes.'
          fi
