# Build & deploy the Dove Go worker to production (dovego.it), running any new
# D1 migrations first. The scheduled run rebuilds so the embedded crawler data
# trails the collector by at most ~6 hours; user submissions merge live from D1.
name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun run build:prod
      - run: bun x wrangler d1 migrations apply dovego --remote
      - run: bun x wrangler deploy

  # Post-deploy smoke check against the live site — fails the run if a shipped
  # deploy has a broken shard, detail page or image URL (things unit tests and
  # the build can't see). Retries a few times for edge propagation.
  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun run scripts/smoke.ts
